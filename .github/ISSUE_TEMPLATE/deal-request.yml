name: Zebepay deal request
description: Request private commercial contact without posting confidential details.
title: "Deal request: "
labels:
  - deal-request
body:
  - type: markdown
    attributes:
      value: |
        This public request is only for safe initial routing. Do not post budget, confidential company strategy, bank/provider details, private documents, customer data, credentials, BVN/NIN values, or infrastructure details. For serious commercial discussions, use the approved private email/form after the initial request.
  - type: dropdown
    id: buyer_category
    attributes:
      label: Buyer category
      options:
        - Founder or startup
        - Agency or software firm
        - Cooperative or financial group
        - Licensed financial operator
        - Investor or acquisition reviewer
        - Other commercial buyer
    validations:
      required: true
  - type: textarea
    id: use_case
    attributes:
      label: General use case
      description: Keep this high-level. Do not include confidential plans, provider details, customer data, or private documents.
    validations:
      required: true
  - type: dropdown
    id: package_interest
    attributes:
      label: Package interest
      options:
        - Code review access
        - Source code buyer package
        - White-label and setup support
        - Not sure yet
    validations:
      required: true
  - type: textarea
    id: private_contact
    attributes:
      label: Request for private contact
      description: Ask for the approved private email/form. Do not post private documents or sensitive details here.
      placeholder: Please send the approved private contact path for serious commercial discussion.
    validations:
      required: true
